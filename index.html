<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div  class="falling-icons">
<span>🎓</span> 
<span>📚</span> 
<span>✏️</span> 
<span>📖</span> 
<span>🌍</span> 
<span>🎒</span> 
<span>📝</span> 
<span>📚</span> 
<span>🎓</span>
<span>✏️</span>
</div>
<div class="container">

    <h1>Student Registration</h1>

    <div class="input-box">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="name" placeholder="Enter Name">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" id="roll" placeholder="Roll Number">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-book"></i>
        <input type="text" id="course" placeholder="Course">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
        <i class="fa-solid fa-phone"></i>
        <input type="text" id="phone" placeholder="Phone Number">
    </div>

    <label>Upload Resume (Max 20KB)</label>
    <input type="file" id="resume" accept=".pdf,.doc,.docx">

    <label>Upload 10th PDF (Max 20KB)</label>
    <input type="file" id="tenth" accept=".pdf">

    <label>Upload Inter PDF (Max 20KB)</label>
    <input type="file" id="inter" accept=".pdf">

    <button onclick="registerStudent()">
        Submit Registration
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
