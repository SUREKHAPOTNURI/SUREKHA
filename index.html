<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. Semantic Header with Flexbox Nav -->
    <header class="navbar">
        div class="logo">DevPortfolio</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#" onclick="showContact()">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!-- 2. Hero Section -->
    <main id="home" class="hero">
        <h1>Hi, I'm <span id="user-name">Student Name</span></h1>
        <p>Aspiring MERN Stack Developer</p>
    </header>
    <!-- 3. Skills Section (Generated by JS) -->
    <section id="skills" class="skills-container">
        <h2>My Skills</h2>
        <div id="skills-list" class="flex-grid">
            <!-- Skills will be injected here by JS -->
        </div>
    </section>
    <footer>
        <p>© 2026 Built during MERN Internship</p>
    </footer>
        <script src="script.css"></script>
</body>
</html>
